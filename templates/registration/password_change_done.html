{% extends "base.html" %}

{% block title %}Mot de passe mis à jour{% endblock %}
{% block body_class %}auth-login-page{% endblock %}

{% block content %}
  <div class="auth-login-wrap">
    <div class="auth-login-card p-4 p-md-5 text-center">
      <div class="auth-login-badge mb-3">
        <i class="bi bi-check-circle text-success"></i>
      </div>
      <h1 class="h3 section-title mb-3">Mot de passe enregistré</h1>
      <p class="auth-login-subtitle mb-4">Vous pouvez continuer à utiliser l’application.</p>
      <a href="{% url 'fournisseurs:dashboard' %}" class="btn btn-primary d-inline-flex align-items-center gap-2">
        <i class="bi bi-house"></i>
        <span>Accéder au tableau de bord</span>
      </a>
    </div>
  </div>
{% endblock %}
