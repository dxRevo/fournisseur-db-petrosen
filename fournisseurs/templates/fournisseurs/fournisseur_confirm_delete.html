{% extends "base.html" %}

{% block title %}Supprimer fournisseur{% endblock %}

{% block content %}
  <div class="card">
    <div class="card-body">
      <h1 class="h3 mb-3">Confirmer la suppression</h1>
      <p class="text-muted">
        Cette action supprimera définitivement : <strong>{{ fournisseur.raison_sociale }}</strong>.
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">Supprimer</button>
          <a class="btn btn-outline-secondary" href="{% url 'fournisseurs:fournisseurs_list' %}">Annuler</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
